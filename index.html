<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DOOM Fire Playground</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=VT323&display=swap" rel="stylesheet">
    </head>
    <body>
        <main class="page">
            <header class="title">
                <h1>DOOM Fire Playground</h1>
            </header>

            <div class="fire-box">
                <div id="base"></div>
            </div>

            <div class="buttons">
                <button type="button" onclick="decreaseFire()" aria-label="Decrease fire">−</button>
                <button type="button" onclick="destroyFire()">Minimum Fire</button>
                <button type="button" onclick="createFireSource()">Maximum Fire</button>
                <button type="button" onclick="increaseFire()" aria-label="Increase fire">+</button>
            </div>

            <footer>
                <p><a href="https://github.com/izabela-am">Made by Izabela</a></p>
            </footer>
        </main>

        <script src="script.js"></script>
    </body>
</html>
